<!DOCTYPE html>
<html>
  <head>
    <title>Demo Cibersegurança - QR Code Malware</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
      
      <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

      <a-marker type="pattern" url="marker.patt">
        
        <a-plane position="0 0 0" rotation="-90 0 0" width="2.8" height="1.5" color="#1e375a" material="opacity: 0.9;">
          <a-text value="OFERTA EXCLUSIVA: GEMAS" align="center" position="0 0.5 0.1" scale="0.6 0.6 0.6" color="#f1c40f"></a-text>
          
          <a-plane position="0 -0.3 0.05" width="2.2" height="0.6" color="#c0392b">
             <a-text value="COMPRAR POR R$ 100,00" align="center" position="0 0 0.05" scale="0.8 0.8 0.8" color="white"></a-text>
          </a-plane>
        </a-plane>

        <a-plane id="malicious-overlay" 
                 class="clickable"
                 position="0 0.1 0" 
                 rotation="-90 0 0" 
                 width="2.9" height="1.6" 
                 material="opacity: 0.2; color: #ff0000"
                 animation="property: material.opacity; from: 0.1; to: 0.4; dur: 1200; dir: alternate; loop: true"
                 onclick="showHackAlert()">
          
          <a-text value="[VERIFICADO PELA LOJA]" align="center" position="0 -0.7 0.1" scale="0.4 0.4 0.4" color="#ff4444"></a-text>
          
          <a-circle color="white" radius="0.1" position="1.3 0.65 0.1">
              <a-text value="X" color="black" align="center" position="0 0 0.01" scale="0.6 0.6 0.6"></a-text>
          </a-circle>
        </a-plane>
        
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function showHackAlert() {
        // Alerta final explicando a fraude do QR Code
        alert("⚠️ SEGURANÇA VIOLADA!\n\nO QR Code que você escaneou não era apenas um link, era o próprio gatilho do ataque.\n\nEste é um exemplo de 'QRishing' (QR Phishing) combinado com AR Overlay. O atacante roubou seu clique e seus dados financeiros simularam o envio.");
      }
    </script>
  </body>
</html>
