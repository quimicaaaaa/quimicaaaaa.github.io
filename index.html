<!DOCTYPE html>
<html>
  <head>
    <title>Demo Cibersegurança - Imagem Flutuante em AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="btnBanco" src="botao_banco.png">
      </a-assets>

      <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

      <a-marker type="pattern" url="marker.patt">
        
        <a-image src="#btnBanco" 
                 position="0 0.5 0" 
                 rotation="-90 0 0" 
                 width="2.5" 
                 height="1.2">
        </a-image>

        <a-plane id="malicious-overlay" 
                 class="clickable"
                 position="0 0.55 0" 
                 rotation="-90 0 0" 
                 width="2.6" 
                 height="0.9" 
                 material="opacity: 0.3; color: #ff0000"
                 animation="property: material.opacity; from: 0.1; to: 0.5; dur: 800; dir: alternate; loop: true"
                 onclick="showHackAlert()">
          
          <a-text value="[CONEXAO SEGURA ATIVA]" align="center" position="0 -0.5 0.1" scale="0.4 0.4 0.4" color="#ff4444"></a-text>
        </a-plane>
        
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function showHackAlert() {
        alert("⚠️ ATAQUE DE OVERLAY CONFIRMADO!\n\nA interface bancária flutuante é real, mas você interagiu com uma camada maliciosa invisível que sobrepõe a imagem legítima.\n\nEste é um exemplo clássico de 'AR Overlay Attack' em cibersegurança.");
      }
    </script>
  </body>
</html>
