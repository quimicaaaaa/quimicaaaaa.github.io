<!DOCTYPE html>
<html>
<head>
    <title>Arqueiro Digital v4.0</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .censura { position: absolute; top: 30%; left: 25%; width: 50%; height: 20%; 
                   background: rgba(0,0,0,0.9); display: none; border: 2px solid red; 
                   color: white; text-align: center; line-height: 100px; font-weight: bold; }
        .status { color: #00FF00; position: absolute; top: 20px; left: 20px; font-size: 14px; text-shadow: 2px 2px black; }
        .grace { color: yellow; position: absolute; bottom: 50px; width: 100%; text-align: center; display: none; font-size: 20px; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="hud">
        <div class="status">IA GUARDIA: ATIVA<br>LATENCIA: 12ms<br>BATERIA: 9h 12min</div>
        <div id="box" class="censura">DADO CONFIDENCIAL - CENSURADO</div>
        <div id="graceMsg" class="grace">SINAL PERDIDO: GRACE PERIOD ATIVO (15:00)</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const box = document.getElementById('box');
        const grace = document.getElementById('graceMsg');

        // Ativa a câmera real
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });

        // SIMULAÇÃO REAL POR COMANDO DE TOQUE
        document.body.onclick = () => {
            if (box.style.display === 'none') {
                box.style.display = 'block'; // Ativa a Censura na Borda
            } else if (grace.style.display === 'none') {
                grace.style.display = 'block'; // Ativa o Grace Period
                box.style.display = 'none';
            } else {
                box.style.display = 'none';
                grace.style.display = 'none';
            }
        };
    </script>
</body>
</html>
