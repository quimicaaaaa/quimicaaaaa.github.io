<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARQUEIRO DIGITAL v4.0</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .status { color: #00FF00; position: absolute; top: 20px; left: 20px; font-size: 28px; font-weight: bold; text-shadow: 2px 2px black; }
        
        /* Estágio 1: Censura */
        .censura { 
            position: absolute; top: 30%; left: 10%; width: 80%; height: 25%; 
            background: rgba(0,0,0,0.95); display: none; border: 5px solid red; 
            color: white; text-align: center; font-size: 30px; font-weight: bold;
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* Estágio 3: Grace Period */
        .grace { 
            background: yellow; color: #000; position: absolute; bottom: 15%; 
            left: 5%; width: 90%; padding: 20px 0; text-align: center; 
            display: none; font-size: 35px; font-weight: 900; border-radius: 10px;
        }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="hud">
        <div class="status">● IA GUARDIA: ATIVA<br>● BATERIA: 9h 45m</div>
        <div id="boxCensura" class="censura">DADO CONFIDENCIAL<br><span style="font-size:15px">BLOQUEADO POR SEGURANÇA</span></div>
        <div id="msgGrace" class="grace">⚠️ GRACE PERIOD: 15:00</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const box = document.getElementById('boxCensura');
        const grace = document.getElementById('msgGrace');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });

        let passo = 0;
        document.body.onclick = () => {
            passo++;
            if (passo === 1) {
                // MOSTRA CENSURA
                box.style.display = 'flex';
                grace.style.display = 'none';
            } else if (passo === 2) {
                // DESBLOQUEIA (NFC) - TELA LIMPA
                box.style.display = 'none';
                grace.style.display = 'none';
            } else if (passo === 3) {
                // CAI O SINAL - MOSTRA GRACE PERIOD
                box.style.display = 'none';
                grace.style.display = 'block';
            } else {
                // RESET
                box.style.display = 'none';
                grace.style.display = 'none';
                passo = 0;
            }
        };
    </script>
</body>
</html>
