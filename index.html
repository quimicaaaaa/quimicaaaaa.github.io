
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ff;--surface:#fff;--border:#ddd6fe;
  --purple:#5b21b6;--purple-light:#ede9fe;--purple-mid:#7c3aed;
  --text:#1a1410;--text-2:#4c3d6e;--text-3:#9d8ec0;
  --teal:#5b21b6;--teal-light:#ede9fe;
  --amber:#6d28d9;--amber-light:#f5f3ff;
  --radius:12px;--radius-lg:18px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:500px}
h1,h2,.serif{font-family:'DM Serif Display',serif}

.app{display:flex;flex-direction:column;gap:0;min-height:500px}
header{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:#ede9fe;border-bottom:1px solid #ddd6fe}
.logo h1{font-size:22px;color:#3b0764;letter-spacing:-0.5px}
.logo p{font-size:11px;color:#7c3aed;font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.tabs{display:flex;gap:2px;background:#ddd6fe;border-radius:10px;padding:3px}
.tab{padding:6px 14px;border:none;background:transparent;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#6d28d9;cursor:pointer;transition:all .2s}
.tab.active{background:#fff;color:#4c1d95;font-weight:600;box-shadow:0 1px 3px rgba(91,33,182,.15)}

.content{padding:16px 20px 20px;background:var(--bg)}

.atlas-layout{display:grid;grid-template-columns:210px 1fr;gap:14px;min-height:420px}
.sidebar{background:#fff;border:0.5px solid #ddd6fe;border-radius:var(--radius-lg);padding:14px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:450px}
.sidebar-section{font-size:9px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:.08em;padding:6px 0 2px}
.tissue-btn{width:100%;text-align:left;padding:7px 10px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;color:#6d28d9;transition:all .15s;display:flex;align-items:center;gap:7px}
.tissue-btn:hover{background:#f5f3ff;color:#3b0764}
.tissue-btn.active{background:#ede9fe;color:#4c1d95;font-weight:600}
.tissue-dot{width:6px;height:6px;border-radius:50%;background:#7c3aed;flex-shrink:0;opacity:.4}
.tissue-btn.active .tissue-dot{opacity:1}

.atlas-main{background:#fff;border:0.5px solid #ddd6fe;border-radius:var(--radius-lg);padding:22px;display:flex;flex-direction:column;gap:18px}
.atlas-top{display:flex;gap:22px;align-items:flex-start}
.scope-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0}
.scope{width:180px;height:180px;background:#f5f3ff;border:3px solid #7c3aed;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.scope-label{font-size:9px;font-weight:600;color:#6d28d9;text-transform:uppercase;letter-spacing:.08em;background:#ede9fe;padding:3px 10px;border-radius:20px}
.atlas-info{flex:1}
.atlas-name{font-size:21px;color:#3b0764;font-family:'DM Serif Display',serif;line-height:1.2;margin-bottom:4px}
.atlas-class{font-size:11px;font-weight:600;color:#7c3aed;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-card{padding:12px;border-radius:10px;border:0.5px solid}
.info-card.morfo{background:#faf5ff;border-color:#ddd6fe}
.info-card.clin{background:#f5f3ff;border-color:#c4b5fd}
.info-card h4{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.info-card.morfo h4{color:#6d28d9}
.info-card.clin h4{color:#5b21b6}
.info-card p{font-size:12px;line-height:1.5}
.info-card.morfo p{color:#3b0764}
.info-card.clin p{color:#4c1d95}
.atlas-footer{display:flex;align-items:center;gap:8px;padding-top:12px;border-top:0.5px solid #e8e2f8}
.func-label{font-size:9px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.func-tags{display:flex;flex-wrap:wrap;gap:6px}
.func-tag{padding:4px 10px;background:#ede9fe;color:#5b21b6;font-size:11px;font-weight:600;border-radius:6px}

.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.fc{height:130px;perspective:1000px;cursor:pointer}
.fc-inner{width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;position:relative}
.fc.flipped .fc-inner{transform:rotateY(180deg)}
.fc-f,.fc-b{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;padding:12px;text-align:center;border-radius:10px;border:0.5px solid}
.fc-f{background:#fff;border-color:#ddd6fe;color:#3b0764;font-size:12px;font-weight:500}
.fc-b{background:#5b21b6;color:#ede9fe;font-size:11px;transform:rotateY(180deg);border-color:#7c3aed}
.fc-num{position:absolute;top:7px;left:10px;font-size:9px;font-weight:600;color:#a78bfa}
.fc-flip-hint{position:absolute;bottom:6px;right:8px;font-size:8px;color:#c4b5fd}
.fc.flipped .fc-flip-hint{display:none}

.quiz-wrap{max-width:560px;margin:0 auto;background:#fff;border:0.5px solid #ddd6fe;border-radius:var(--radius-lg);padding:28px}
.quiz-setup{text-align:center}
.quiz-setup h2{font-size:22px;color:#3b0764;margin-bottom:6px}
.quiz-setup p{font-size:13px;color:#6d28d9;margin-bottom:22px}
.btn-primary{background:#5b21b6;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#4c1d95}
.btn-secondary{background:#f5f3ff;color:#4c1d95;border:0.5px solid #ddd6fe;padding:8px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.quiz-meta{display:flex;justify-content:space-between;margin-bottom:14px}
.quiz-prog,.quiz-score-txt{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#a78bfa}
.quiz-score-txt{color:#7c3aed}
.quiz-q{font-size:16px;font-weight:500;color:#3b0764;margin-bottom:16px;font-family:'DM Serif Display',serif;line-height:1.4}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{text-align:left;padding:11px 14px;border:0.5px solid #ddd6fe;border-radius:9px;background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;color:#3b0764;cursor:pointer;transition:all .15s}
.opt-btn:hover:not(:disabled){background:#faf5ff;border-color:#c4b5fd}
.opt-btn.correct{background:#f5f3ff;border-color:#7c3aed;color:#3b0764}
.opt-btn.wrong{background:#fdf4ff;border-color:#c4b5fd;color:#6d28d9}
.quiz-fb{margin-top:14px;padding:12px;border-radius:9px;background:#faf5ff;border:0.5px solid #ddd6fe;display:none}
.quiz-fb.show{display:block}
.fb-txt{font-size:12px;color:#4c1d95;line-height:1.6;margin-bottom:10px}
.quiz-end{text-align:center;display:none}
.quiz-end h2{font-size:24px;color:#3b0764;margin-bottom:8px}
.result-score{font-size:42px;font-family:'DM Serif Display',serif;color:#5b21b6;margin:12px 0 4px}
.result-sub{font-size:13px;color:#6d28d9;margin-bottom:20px}
.progress-bar-wrap{background:#ede9fe;border-radius:100px;height:6px;margin-bottom:18px;overflow:hidden}
.progress-bar-fill{height:100%;background:#7c3aed;border-radius:100px;transition:width .4s}
.stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.stat{text-align:center}
.stat-num{font-size:22px;font-weight:600;font-family:'DM Serif Display',serif}
.stat-num.green{color:#5b21b6}.stat-num.red{color:#9333ea}
.stat-lbl{font-size:10px;color:#a78bfa;text-transform:uppercase;letter-spacing:.06em}
</style>

<div class="app">
  <header>
    <div class="logo">
      <h1>HistoPro</h1>
      <p>Epitélios · Glândulas · Estruturas</p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('atlas',event)">Atlas</button>
      <button class="tab" onclick="switchTab('fc',event)">Flashcards</button>
      <button class="tab" onclick="switchTab('quiz',event)">Simulado</button>
    </div>
  </header>

  <div class="content">
    <div id="sec-atlas">
      <div class="atlas-layout">
        <div class="sidebar" id="atlas-list"></div>
        <div class="atlas-main">
          <div class="atlas-top">
            <div class="scope-wrap">
              <div class="scope"><svg id="scope-svg" viewBox="0 0 200 200" width="150" height="150"></svg></div>
              <span class="scope-label">H&amp;E · x400</span>
            </div>
            <div class="atlas-info">
              <div class="atlas-name" id="a-name">—</div>
              <div class="atlas-class" id="a-class">—</div>
              <div class="info-grid">
                <div class="info-card morfo"><h4>Morfofisiologia</h4><p id="a-desc"></p></div>
                <div class="info-card clin"><h4>Exemplo clínico</h4><p id="a-clin"></p></div>
              </div>
            </div>
          </div>
          <div class="atlas-footer">
            <span class="func-label">Funções</span>
            <div class="func-tags" id="a-funcs"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="sec-fc" style="display:none">
      <div class="fc-grid" id="fc-grid"></div>
    </div>

    <div id="sec-quiz" style="display:none">
      <div class="quiz-wrap">
        <div id="q-setup" class="quiz-setup">
          <h2 class="serif">Simulado de diagnóstico</h2>
          <p>10 questões baseadas no conteúdo de epitélios e glândulas</p>
          <button class="btn-primary" onclick="startQuiz()">Iniciar exame</button>
        </div>
        <div id="q-game" style="display:none">
          <div class="quiz-meta">
            <span class="quiz-prog" id="q-prog"></span>
            <span class="quiz-score-txt" id="q-score-txt"></span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="q-bar" style="width:0%"></div></div>
          <div class="quiz-q" id="q-question"></div>
          <div class="quiz-opts" id="q-opts"></div>
          <div class="quiz-fb" id="q-fb">
            <p class="fb-txt" id="q-fb-txt"></p>
            <button class="btn-secondary" onclick="nextQ()">Continuar →</button>
          </div>
        </div>
        <div id="q-end" class="quiz-end">
          <h2 class="serif">Resultado final</h2>
          <div class="result-score" id="q-final-num"></div>
          <div class="result-sub" id="q-final-msg"></div>
          <div class="stat-row">
            <div class="stat"><div class="stat-num green" id="q-correct"></div><div class="stat-lbl">Corretas</div></div>
            <div class="stat"><div class="stat-num red" id="q-wrong"></div><div class="stat-lbl">Incorretas</div></div>
          </div>
          <button class="btn-secondary" onclick="resetQuiz()">Reiniciar</button>
        </div>
      </div>
    </div>
  </div>
</div>

const QUIZ=[{q:"Qual a classificação histológica do epitélio da traqueia?",a:["Epitélio simples pavimentoso com cílios","Epitélio pseudoestratificado cilíndrico ciliado","Epitélio estratificado cilíndrico queratinizado","Epitélio cúbico simples ciliado"],c:1,r:"O epitélio respiratório é pseudoestratificado cilíndrico ciliado, com cílios que movimentam o muco."},{q:"O pâncreas é classificado como glândula:",a:["Exócrina composta exclusivamente serosa","Endócrina com secreção merócrina","Anfícrina sendo endocrina e exocrina","Apócrina com secreção lipídica"],c:2,r:"O pâncreas possui porção exócrina (ácinos serosos → enzimas digestivas) e endócrina (ilhotas de Langerhans → insulina e glucagon)."},{q:"Em qual estrutura encontramos o epitélio simples cilíndrico?",a:["Alvéolos pulmonares especializados em trocas gasosas","Mucosa do jejuno e duodeno (intestino)","Revestimento interno da traqueia","Epitélio de transição da bexiga"],c:1,r:"Células altas são ideais para a absorção ativa de nutrientes no intestino delgado."},{q:"A parótida secreta principalmente qual enzima?",a:["Tripsina ativa","Amilase salivar","Pepsina ácida","Lipase pancreática"],c:1,r:"A parótida é uma glândula exócrina acinar serosa composta que produz amilase salivar."},{q:"O que caracteriza uma glândula endócrina?",a:["Presença de ductos longos e ramificados","Secreção hormonal diretamente no sangue","Produção exclusiva de secreções mucosas","Dependência de estímulos mecânicos locais"],c:1,r:"Glândulas endócrinas perdem a conexão ductal e secretam hormônios diretamente nos capilares sanguíneos."},{q:"Classificação da glândula sudorípara:",a:["Acinar mucosa composta","Tubular simples enovelada ","Endócrina folicular rica em coloide","Apócrina alveolar simples"],c:1,r:"A glândula sudorípara é um tubo longo e enovelado na derme, responsável pela termorregulação."},{q:"Qual o epitélio do esôfago?",a:["Simples cilíndrico com microvilosidades","Estratificado pavimentoso não queratinizado","Pseudoestratificado ciliado com células caliciformes","Cúbico simples secretor"],c:1,r:"O esôfago possui epitélio estratificado pavimentoso para resistir ao atrito do alimento."},{q:"Qual a classificação do epitélio do ducto biliar?",a:["Estratificado pavimentoso queratinizado","Simples cúbico a cilíndrico ","Pseudoestratificado ciliado respiratório","Epitélio germinativo especializado"],c:1,r:"O ducto biliar é revestido por epitélio simples (cúbico a cilíndrico) especializado em condução."},{q:"O testículo possui qual tipo de epitélio especializado?",a:["Epitélio de transição adaptativo","Epitélio germinativo ","Epitélio simples pavimentoso vascular","Epitélio cúbico estratificado glandular"],c:1,r:"O epitélio germinativo dos túbulos seminíferos produz espermatozoides e é sustentado pelas células de Sertoli."},{q:"Qual a principal função do epitélio pavimentoso simples?",a:["Proteção contra abrasão intensa","Difusão e filtração devido à baixa espessura","Secreção ativa de enzimas digestivas","Transporte ativo com gasto energético elevado"],c:1,r:"A espessura mínima desse epitélio permite trocas gasosas e filtração rápida nos alvéolos e glomérulos."}];

let selId=DATA[0].id,qIdx=0,qScore=0,qWrong=0;

function switchTab(t,e){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  ['atlas','fc','quiz'].forEach(s=>document.getElementById('sec-'+s).style.display='none');
  document.getElementById('sec-'+t).style.display='block';
}
function buildSidebar(){
  const list=document.getElementById('atlas-list');
  let curSec='';
  DATA.forEach(d=>{
    if(d.sec!==curSec){curSec=d.sec;const s=document.createElement('div');s.className='sidebar-section';s.textContent=d.sec;list.appendChild(s);}
    const b=document.createElement('button');b.className='tissue-btn';b.id='btn-'+d.id;
    b.innerHTML=`<span class="tissue-dot"></span>${d.name}`;
    b.onclick=()=>selectAtlas(d.id);list.appendChild(b);
  });
}
function selectAtlas(id){
  const d=DATA.find(x=>x.id===id);selId=id;
  document.getElementById('a-name').textContent=d.name;
  document.getElementById('a-class').textContent=d.cls;
  document.getElementById('a-desc').textContent=d.desc;
  document.getElementById('a-clin').textContent=d.clin;
  document.getElementById('scope-svg').innerHTML=d.svg;
  const ft=document.getElementById('a-funcs');
  ft.innerHTML=d.func.map(f=>`<span class="func-tag">${f}</span>`).join('');
  document.querySelectorAll('.tissue-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+id).classList.add('active');
}
function buildFC(){
  const g=document.getElementById('fc-grid');
  FLASHCARDS.forEach((c,i)=>{
    const d=document.createElement('div');d.className='fc';
    d.onclick=()=>d.classList.toggle('flipped');
    d.innerHTML=`<div class="fc-inner"><div class="fc-f"><span class="fc-num">${String(i+1).padStart(2,'0')}</span>${c.f}<span class="fc-flip-hint">toque ↻</span></div><div class="fc-b">${c.b}</div></div>`;
    g.appendChild(d);
  });
}
function startQuiz(){
  qIdx=0;qScore=0;qWrong=0;
  document.getElementById('q-setup').style.display='none';
  document.getElementById('q-game').style.display='block';
  loadQ();
}
function loadQ(){
  const q=QUIZ[qIdx];
  document.getElementById('q-bar').style.width=Math.round((qIdx/QUIZ.length)*100)+'%';
  document.getElementById('q-prog').textContent=`Questão ${qIdx+1} de ${QUIZ.length}`;
  document.getElementById('q-score-txt').textContent=`Acertos: ${qScore}`;
  document.getElementById('q-question').textContent=q.q;
  const opts=document.getElementById('q-opts');opts.innerHTML='';
  q.a.forEach((opt,i)=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=opt;b.onclick=()=>checkQ(i,b);opts.appendChild(b);});
  document.getElementById('q-fb').className='quiz-fb';
}
function checkQ(idx,btn){
  const q=QUIZ[qIdx];
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(idx===q.c){qScore++;btn.className='opt-btn correct';}
  else{qWrong++;btn.className='opt-btn wrong';document.querySelectorAll('.opt-btn')[q.c].className='opt-btn correct';}
  document.getElementById('q-fb-txt').innerHTML=`<strong>${idx===q.c?'Correto!':'Incorreto.'}</strong> ${q.r}`;
  document.getElementById('q-fb').className='quiz-fb show';
}
function nextQ(){
  qIdx++;
  if(qIdx<QUIZ.length){loadQ();}
  else{
    document.getElementById('q-game').style.display='none';
    const end=document.getElementById('q-end');end.style.display='block';
    document.getElementById('q-final-num').textContent=`${qScore}/${QUIZ.length}`;
    const pct=Math.round((qScore/QUIZ.length)*100);
    document.getElementById('q-final-msg').textContent=pct>=90?'Excelente domínio do conteúdo!':pct>=70?'Bom desempenho — revise os erros.':'Continue estudando o material.';
    document.getElementById('q-correct').textContent=qScore;
    document.getElementById('q-wrong').textContent=qWrong;
  }
}
function resetQuiz(){document.getElementById('q-end').style.display='none';document.getElementById('q-setup').style.display='block';}
buildSidebar();selectAtlas(DATA[0].id);buildFC();
</script>
