<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste do Mural</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">

    <div class="max-w-xl mx-auto bg-slate-800 p-6 rounded-xl shadow-2xl">
        <h1 class="text-2xl mb-4 text-sky-400 font-bold">Postar no Mural</h1>
        
        <input id="nome-autor" type="text" placeholder="Seu nome" class="w-full mb-2 p-2 rounded bg-slate-700 border-none">
        <textarea id="texto-post" placeholder="Mensagem..." class="w-full p-2 rounded bg-slate-700 border-none"></textarea>
        
        <button onclick="enviarPost()" class="w-full mt-4 bg-sky-600 p-3 rounded font-bold hover:bg-sky-500">
            PUBLICAR AGORA
        </button>

        <div id="feed" class="mt-10 space-y-4">
            </div>
    </div>

    <script>
        // SUBSTITUA ESTAS DUAS LINHAS COM SEUS DADOS
        const SUPABASE_URL = 'https://ydvrfyztxfehldkviqlx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jLadz9tvYQVA0t6w-Usstw_p6WNUIsc';

        const supabaseClient = supabase.createClient(URL, KEY);

        // FUNÇÃO DE TESTE IMEDIATO
        console.log("O script carregou com sucesso!");

        async function enviarPost() {
            console.log("Botão clicado!");
            
            const autor = document.getElementById('nome-autor').value || 'Anônimo';
            const conteudo = document.getElementById('texto-post').value;

            if (!conteudo) {
                alert("Escreva algo!");
                return;
            }

            const senha = prompt("Senha da galera:");
            if (senha !== "1234") {
                alert("Senha errada!");
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('posts')
                    .insert([{ autor, conteudo }]);

                if (error) throw error;

                alert("Postado com sucesso!");
                document.getElementById('texto-post').value = '';
                carregar();
            } catch (err) {
                console.error("Erro no Supabase:", err);
                alert("Erro: " + err.message);
            }
        }

        async function carregar() {
            const { data, error } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            if (error) return;
            
            const div = document.getElementById('feed');
            div.innerHTML = '';
            data.forEach(p => {
                div.innerHTML += `<div class="p-4 bg-slate-700 rounded-lg">
                    <b class="text-sky-400">@${p.autor}</b>: ${p.conteudo}
                </div>`;
            });
        }

        carregar();
    </script>
</body>
</html>
