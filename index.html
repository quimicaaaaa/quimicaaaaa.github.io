<!DOCTYPE html>
<html>
  <head>
    <title>Demo Cibersegurança - Imagem Flutuante em AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="btnBanco" src="botao_banco2.png">
      </a-assets>

      <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

     <a-marker type="pattern" url="marker.patt">

  <a-image id="btn-orig" src="#btnBanco" position="0 0.5 0" rotation="-90 0 0" width="2.5" height="0.8"></a-image>

  <a-plane id="malicious-overlay" 
           class="clickable"
           position="0 0.55 0" rotation="-90 0 0" 
           width="2.6" height="0.9" 
           material="opacity: 0.2; color: #ff0000"
           onclick="abrirFormulario()">
  </a-plane>

  <a-entity id="fake-form" position="0 1 -0.5" rotation="-45 0 0" visible="false">
    <a-plane width="2.5" height="1.8" color="#1a1a1a" material="opacity: 0.9">
      <a-text value="CONFIRME SUA SENHA PIX" align="center" position="0 0.6 0.1" scale="0.5 0.5 0.5" color="white"></a-text>
      
      <a-text id="digits" value="****" align="center" position="0 0.1 0.1" scale="1 1 1" color="#00ff00"></a-text>

      <a-plane class="clickable" position="-0.6 -0.5 0.1" width="0.4" height="0.4" color="#333" onclick="digitar()">
        <a-text value="1" align="center" position="0 0 0.05"></a-text>
      </a-plane>
      <a-plane class="clickable" position="0 -0.5 0.1" width="0.4" height="0.4" color="#333" onclick="digitar()">
        <a-text value="2" align="center" position="0 0 0.05"></a-text>
      </a-plane>
      <a-plane class="clickable" position="0.6 -0.5 0.1" width="0.4" height="0.4" color="#333" onclick="digitar()">
        <a-text value="3" align="center" position="0 0 0.05"></a-text>
      </a-plane>

      <a-text value="DIGITE PARA AUTORIZAR" align="center" position="0 -0.8 0.1" scale="0.3 0.3 0.3" color="#aaa"></a-text>
    </a-plane>
  </a-entity>

</a-marker>

<script>
  function abrirFormulario() {
    // Esconde o overlay e mostra o formulário de roubo de senha
    document.querySelector('#fake-form').setAttribute('visible', 'true');
    document.querySelector('#malicious-overlay').setAttribute('visible', 'false');
  }

  function digitar() {
    alert("⚠️ DADO CAPTURADO!\n\nO atacante acabou de registrar o que você digitou no teclado virtual falso.\n\nIsso é um Keylogger em Realidade Aumentada.");
  }
</script>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function showHackAlert() {
        alert("⚠️ ATAQUE DE OVERLAY CONFIRMADO!\n\nA interface bancária flutuante é real, mas você interagiu com uma camada maliciosa invisível que sobrepõe a imagem legítima.\n\nEste é um exemplo clássico de 'AR Overlay Attack' em cibersegurança.");
      }
    </script>
  </body>
</html>
