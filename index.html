<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Canto ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .post-card { background: #1e293b; border: 1px solid #334155; transition: 0.3s; }
        .post-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-sky-400">✨ Nosso Canto</h1>
            <div id="user-info" class="text-sm text-slate-400"></div>
        </header>

        <div class="bg-slate-800 p-6 rounded-xl mb-8 shadow-xl">
            <textarea id="texto-post" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="O que está rolando?"></textarea>
            <div class="flex justify-between mt-3">
                <input id="nome-autor" type="text" placeholder="Seu nome" class="bg-slate-900 border border-slate-700 rounded px-3 py-1 text-sm">
                <button onclick="enviarPost()" class="bg-sky-600 hover:bg-sky-500 px-6 py-2 rounded-lg font-bold transition">Postar</button>
            </div>
        </div>

        <div id="feed" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="text-slate-500">Carregando momentos...</p>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE (Substitua pelos seus dados)
        const SUPABASE_URL = 'https://ydvrfyztxfehldkviqlx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jLadz9tvYQVA0t6w-Usstw_p6WNUIsc';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função para buscar posts
        async function carregarPosts() {
            const { data, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            data.forEach(post => {
                feed.innerHTML += `
                    <div class="post-card p-5 rounded-xl shadow-lg">
                        <div class="flex justify-between mb-2">
                            <span class="text-sky-400 font-bold">@${post.autor}</span>
                            <span class="text-xs text-slate-500">${new Date(post.created_at).toLocaleDateString()}</span>
                        </div>
                        <p class="text-slate-200 leading-relaxed">${post.conteudo}</p>
                        <div class="mt-4 flex items-center gap-2">
                            <button onclick="curtir(${post.id}, ${post.curtidas})" class="hover:text-pink-500 transition">❤️ ${post.curtidas}</button>
                        </div>
                    </div>
                `;
            });
        }

        // Função para postar
        async function enviarPost() {
            const conteudo = document.getElementById('texto-post').value;
            const autor = document.getElementById('nome-autor').value || 'Anônimo';

            if (!conteudo) return alert("Escreva algo!");

            const { error } = await supabase
                .from('posts')
                .insert([{ autor, conteudo }]);

            if (!error) {
                document.getElementById('texto-post').value = '';
                carregarPosts();
            }
        }

        // Função para curtir
        async function curtir(id, curtidasAtuais) {
            await supabase
                .from('posts')
                .update({ curtidas: curtidasAtuais + 1 })
                .eq('id', id);
            carregarPosts();
        }

        // Atualiza o feed ao abrir e a cada 10 segundos
        carregarPosts();
        setInterval(carregarPosts, 10000);
    </script>
</body>
</html>
